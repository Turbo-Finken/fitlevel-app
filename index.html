<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAITAMA PROTOCOL | FIXED</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com"/>
    <style>
        :root { --primary: #ff4d4d; --bg: #050505; --card: #121214; --accent: #00f2ff; --gold: #ffd700; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app { width: 100%; max-width: 450px; padding: 20px; display: flex; flex-direction: column; }
        
        .hero-card { 
            background: linear-gradient(145deg, #1a1a1d, #0f0f12); border-radius: 28px; padding: 30px; 
            text-align: center; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .streak-val { font-size: 5.5rem; font-weight: 900; line-height: 1; color: var(--primary); text-shadow: 0 0 30px rgba(255,77,77,0.4); }
        
        .timer-zone { 
            background: #111; height: 60px; border-radius: 18px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
            border: 1px solid #222; cursor: pointer;
        }
        #timerDisplay { font-family: monospace; font-size: 1.6rem; font-weight: 900; z-index: 5; color: var(--accent); }
        #timerFill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0, 242, 255, 0.15); width: 0%; transition: 1s linear; }

        .exercise-list { display: grid; gap: 15px; }
        .ex-item { 
            background: var(--card); padding: 22px; border-radius: 22px; border: 1px solid #222;
            display: flex; justify-content: space-between; align-items: center; transition: 0.3s; cursor: pointer;
        }
        .ex-item.done { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); transform: scale(0.98); }
        .ex-main { font-size: 2.8rem; font-weight: 900; line-height: 1; }
        .ex-sets { font-size: 0.8rem; color: var(--gold); font-weight: 600; margin-top: 5px; }

        .check-btn { width: 40px; height: 40px; border-radius: 12px; border: 2px solid #333; transition: 0.3s; }
        .done .check-btn { background: var(--gold); border-color: var(--gold); position: relative; }
        .done .check-btn::after { content: '✓'; color: black; font-weight: 900; position: absolute; left: 10px; top: 5px; }

        .btn-finish { 
            background: var(--primary); color: white; border: none; width: 100%; 
            padding: 22px; border-radius: 20px; font-size: 1.2rem; font-weight: 900;
            margin-top: 30px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(255,77,77,0.3);
        }
        .btn-finish:disabled { background: #222; box-shadow: none; color: #444; cursor: not-allowed; opacity: 0.6; }

        @keyframes alarm-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); }
            50% { box-shadow: 0 0 25px 15px rgba(255, 77, 77, 0.2); }
            100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); }
        }
        .alarm-active:not(:disabled) { animation: alarm-pulse 1s infinite; border: 2px solid white; }
    </style>
</head>
<body>

<div class="app animate__animated animate__fadeIn">
    <div id="statusMsg" style="text-align:center; color:var(--accent); font-size:0.7rem; margin-bottom:15px; cursor:pointer;" onclick="askNotif()">🔔 SYSTEM: CLICK TO SYNC NOTIFICATIONS</div>

    <div class="hero-card">
        <div style="font-size: 0.7rem; color: #666; letter-spacing: 3px;">CURRENT STREAK</div>
        <div class="streak-val" id="streak">0</div>
        <div id="lvlName" style="color:var(--gold); font-weight:bold; letter-spacing:2px; margin-top:10px;">RECRUIT</div>
    </div>

    <div class="timer-zone" onclick="startTimer()">
        <div id="timerFill"></div>
        <div id="timerDisplay">START TIMER (30:00)</div>
    </div>

    <div class="exercise-list" id="list"></div>

    <!-- DER WICHTIGE KNOPF -->
    <button class="btn-finish" id="finishBtn" onclick="completeDay()" disabled>PROTOKOLL ABSCHLIESSEN</button>
</div>

<script>
    // 1. DATA (Alles wird hier gespeichert)
    let db = JSON.parse(localStorage.getItem('saitama_final_v11')) || { streak: 0, lastDate: null, baseReps: 20 };
    let done = [false, false, false];
    let timerRunning = false;

    function init() {
        // AUTOMATISCHE STEIGERUNG
        let currentReps = Math.min(db.baseReps + (Math.floor(db.streak / 5) * 10), 100);
        const names = ['Liegestütze', 'Kniebeugen', 'Sit-Ups'];
        const sets = 5;
        const repsPerSet = Math.ceil(currentReps / sets);

        document.getElementById('list').innerHTML = names.map((name, i) => `
            <div class="ex-item" onclick="toggleTask(${i}, this)">
                <div>
                    <div style="color:#666; font-size:0.8rem; font-weight:800;">${name.toUpperCase()}</div>
                    <div class="ex-main">${currentReps}</div>
                    <div class="ex-sets">${sets} SÄTZE À ${repsPerSet}</div>
                </div>
                <div class="check-btn"></div>
            </div>
        `).join('');

        document.getElementById('streak').innerText = db.streak;
        const lvls = ['RECRUIT', 'SOLDIER', 'WARRIOR', 'ELITE', 'HERO'];
        document.getElementById('lvlName').innerText = lvls[Math.min(Math.floor(db.streak/5), 4)];
        
        checkMorningAlarm();
    }

    // TASK TOGGLE (Wichtig für den Button)
    function toggleTask(i, el) {
        done[i] = !done[i];
        el.classList.toggle('done');
        
        // Prüfen, ob alle 3 fertig sind
        const allDone = done.every(val => val === true);
        const btn = document.getElementById('finishBtn');
        btn.disabled = !allDone; // Schaltet den Button frei!
        
        if(navigator.vibrate) navigator.vibrate(10);
    }

    // 07:00 UHR LOGIK
    function checkMorningAlarm() {
        const now = new Date();
        const isAfterSeven = now.getHours() >= 7;
        const todayDone = db.lastDate === now.toDateString();

        if (isAfterSeven && !todayDone) {
            document.getElementById('finishBtn').classList.add('alarm-active');
            if (Notification.permission === "granted") {
                new Notification("WACH AUF!", { body: "Nach 7:00 Uhr! Protokoll offen.", tag: "lock", requireInteraction: true });
            }
        }
    }

    function startTimer() {
        if(timerRunning) return;
        timerRunning = true;
        let sec = 30 * 60;
        const total = sec;
        const interval = setInterval(() => {
            sec--;
            let m = Math.floor(sec/60), s = sec%60;
            document.getElementById('timerDisplay').innerText = `${m}:${s<10?'0':''}${s}`;
            document.getElementById('timerFill').style.width = (100 - (sec/total)*100) + '%';
            if(sec <= 0) { clearInterval(interval); alert("LIMIT ERREICHT!"); }
        }, 1000);
    }

    // DER BUTTON KLICK
    function completeDay() {
        const today = new Date().toDateString();
        if(db.lastDate === today) return alert("Heute schon erledigt!");

        db.streak++;
        db.lastDate = today;
        localStorage.setItem('saitama_final_v11', JSON.stringify(db));

        confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });
        
        setTimeout(() => location.reload(), 1500);
    }

    function askNotif() {
        Notification.requestPermission().then(res => {
            if(res === 'granted') {
                new Notification("SYSTEM BEREIT", { body: "Morgen um 7:00 Uhr geht's los." });
            }
        });
    }

    // Streak Reset Check
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    if(db.lastDate && db.lastDate !== new Date().toDateString() && db.lastDate !== yesterday.toDateString()) {
        db.streak = 0; localStorage.setItem('saitama_final_v11', JSON.stringify(db));
    }

    init();
</script>
</body>
</html>
